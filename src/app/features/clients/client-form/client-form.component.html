<div class="container">
  <h1>{{ isEditMode ? 'Modifier' : 'Nouveau' }} client</h1>

  <div *ngIf="errorMessage" style="color:red; padding:12px; margin-bottom:16px;
              background:#FFEBEE; border-radius:4px;">{{ errorMessage }}</div>

  <form [formGroup]="clientForm" (ngSubmit)="onSubmit()">
    <div class="form-grid">

      <!-- Nom entreprise — OBLIGATOIRE -->
      <mat-form-field appearance="outline">
        <mat-label>Nom entreprise *</mat-label>
        <input matInput formControlName="nom_entreprise">
        <mat-error *ngIf="clientForm.get('nom_entreprise')?.invalid">Requis</mat-error>
      </mat-form-field>

      <!-- Nom contact — optionnel -->
      <mat-form-field appearance="outline">
        <mat-label>Nom contact</mat-label>
        <input matInput formControlName="contact_nom">
      </mat-form-field>

      <!-- Téléphone — OBLIGATOIRE -->
      <mat-form-field appearance="outline">
        <mat-label>Téléphone *</mat-label>
        <input matInput formControlName="telephone">
        <mat-error *ngIf="clientForm.get('telephone')?.invalid">Requis</mat-error>
      </mat-form-field>

      <!-- Email — optionnel, validé si renseigné -->
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
        <mat-error *ngIf="clientForm.get('email')?.hasError('email')">
          Format email invalide
        </mat-error>
      </mat-form-field>

      <!-- Adresse — optionnelle -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Adresse</mat-label>
        <input matInput formControlName="adresse">
      </mat-form-field>

      <!-- RCCM — optionnel -->
      <mat-form-field appearance="outline">
        <mat-label>RCCM</mat-label>
        <input matInput formControlName="rccm">
      </mat-form-field>

      <!-- IFU — optionnel -->
      <mat-form-field appearance="outline">
        <mat-label>IFU</mat-label>
        <input matInput formControlName="ifu">
      </mat-form-field>

      <!-- Régime — optionnel -->
      <mat-form-field appearance="outline">
        <mat-label>Régime d'imposition</mat-label>
        <input matInput formControlName="regime_imposition">
      </mat-form-field>

      <!-- Division fiscale — optionnel -->
      <mat-form-field appearance="outline">
        <mat-label>Division fiscale</mat-label>
        <input matInput formControlName="division_fiscale">
      </mat-form-field>

    </div>

    <div class="actions">
      <button mat-raised-button color="primary" type="submit"
              [disabled]="clientForm.invalid || isLoading">
        {{ isLoading ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
      </button>
      <button mat-button type="button" routerLink="/clients">Annuler</button>
    </div>

    <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" autocomplete="off"></form>

  </form>
</div>
