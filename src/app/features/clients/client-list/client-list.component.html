<div class="container">
  <div class="header">
    <h1>Clients</h1>
    <button mat-raised-button color="primary" routerLink="/clients/new">
      <mat-icon>add</mat-icon> Nouveau client
    </button>
  </div>

  <table mat-table [dataSource]="clients" class="mat-elevation-z8">
    <ng-container matColumnDef="nom_entreprise">
      <th mat-header-cell *matHeaderCellDef> Entreprise </th>
      <td mat-cell *matCellDef="let client"> {{client.nom_entreprise}} </td>
    </ng-container>

    <ng-container matColumnDef="contact_nom">
      <th mat-header-cell *matHeaderCellDef> Contact </th>
      <td mat-cell *matCellDef="let client"> {{client.contact_nom}} </td>
    </ng-container>

    <ng-container matColumnDef="telephone">
      <th mat-header-cell *matHeaderCellDef> Téléphone </th>
      <td mat-cell *matCellDef="let client"> {{client.telephone}} </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let client"> {{client.email}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let client">
        <button mat-icon-button color="primary" [routerLink]="['/clients/edit', client.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteClient(client.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
