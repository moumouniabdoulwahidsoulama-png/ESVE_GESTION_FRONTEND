<div style="padding: 24px;">

  <!-- HEADER -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <h1 style="margin:0;">Bons de Commande</h1>
    <a mat-raised-button routerLink="/bons-commande/new"
       style="background-color:#D4830A; color:white;">
      + Nouveau bon
    </a>
  </div>

  <!-- CHARGEMENT -->
  <div *ngIf="isLoading" style="text-align:center; padding:40px;">
    Chargement...
  </div>

  <!-- ERREUR -->
  <div *ngIf="errorMessage" style="color:red; padding:16px;">
    {{ errorMessage }}
  </div>

  <!-- TABLEAU -->
  <div *ngIf="!isLoading && !errorMessage">

    <div *ngIf="bons.length === 0"
         style="text-align:center; padding:40px; color:#999;">
      Aucun bon de commande pour le moment.
    </div>

    <mat-table [dataSource]="bons" *ngIf="bons.length > 0">

      <!-- Numéro -->
      <ng-container matColumnDef="numero">
        <mat-header-cell *matHeaderCellDef> Numéro </mat-header-cell>
        <mat-cell *matCellDef="let b">
          <strong style="color:#D4830A;">{{ b.numero }}</strong>
        </mat-cell>
      </ng-container>

      <!-- Fournisseur -->
      <ng-container matColumnDef="fournisseur_nom">
        <mat-header-cell *matHeaderCellDef> Fournisseur </mat-header-cell>
        <mat-cell *matCellDef="let b">{{ b.fournisseur_nom }}</mat-cell>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="date_commande">
        <mat-header-cell *matHeaderCellDef> Date </mat-header-cell>
        <mat-cell *matCellDef="let b">{{ b.date_commande | date:'dd/MM/yyyy' }}</mat-cell>
      </ng-container>

      <!-- Total net -->
      <ng-container matColumnDef="total_net">
        <mat-header-cell *matHeaderCellDef> Total Net </mat-header-cell>
        <mat-cell *matCellDef="let b">
          <strong>{{ b.total_net | number:'1.0-0' }} FCFA</strong>
        </mat-cell>
      </ng-container>

      <!-- Statut -->
      <ng-container matColumnDef="statut">
        <mat-header-cell *matHeaderCellDef> Statut </mat-header-cell>
        <mat-cell *matCellDef="let b">
          <span style="padding:4px 10px; border-radius:12px; font-size:12px;
                       background:#E3F2FD; color:#1565C0; font-weight:bold;">
            {{ b.statut }}
          </span>
        </mat-cell>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
        <mat-cell *matCellDef="let b">

          <!-- Télécharger PDF -->
          <button mat-icon-button
                  (click)="telechargerPdf(b.id, b.numero)"
                  title="Télécharger PDF"
                  style="color:#1565C0;">
            <mat-icon>picture_as_pdf</mat-icon>
          </button>

          <!-- Modifier -->
          <button mat-icon-button
                  [routerLink]="['/bons-commande', b.id, 'edit']"
                  title="Modifier"
                  style="color:#D4830A;">
            <mat-icon>edit</mat-icon>
          </button>

          <!-- Supprimer -->
          <button mat-icon-button
                  (click)="supprimerBon(b.id)"
                  title="Supprimer"
                  style="color:#B71C1C;">
            <mat-icon>delete</mat-icon>
          </button>

        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

    </mat-table>
  </div>
</div>
